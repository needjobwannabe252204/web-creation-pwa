<style>
.activity-container{
    margin-top:20px;
}

.activity-header{
    text-align:center;
    margin-bottom:20px;
}

.activity-header h2{
    color:#2563eb;
    margin-bottom:5px;
}

.activity-header p{
    color:#555;
}

.instructions{
    background:#eef4ff;
    border-left:5px solid #2563eb;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    color:black;
}

.example-box{
    background:#f8fafc;
    border:1px solid #cbd5e1;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    color:black;
}

.code-editor{
    width:100%;
    height:140px;
    padding:12px;
    border:2px solid #d1d5db;
    border-radius:10px;
    background:#ffffff;
    color:#000000;
    font-family:Consolas, monospace;
    font-size:15px;
    box-sizing:border-box;
}

.run-btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.run-btn:hover{
    background:#1d4ed8;
}

.output-box{
    min-height:150px;
    margin-top:15px;
    border:2px dashed #cbd5e1;
    border-radius:10px;
    padding:15px;
    background:white;
    color:#555555;
}

.feedback{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:black;
}
</style>

<div class="activity-container">

    <div class="activity-header">
        <h2>📋 HTML Lists Activity</h2>
        <p style="color:black;">Help Maria fix her HTML code.</p>
    </div>

    <div class="instructions">
        <strong>Directions:</strong>
        Maria wants to create a numbered list.
        Replace the blank (<strong>____</strong>) with the correct HTML tag.
    </div>

    <div class="example-box">
        <strong>Expected Output:</strong>
        <ol style="padding-left:30px;">
            <li>Plan</li>
            <li>Code</li>
            <li>Test</li>
        </ol>
    </div>

<textarea id="editor" class="code-editor">
<____>
    <li>Plan</li>
    <li>Code</li>
    <li>Test</li>
</ol>
</textarea>

    <button class="run-btn" onclick="runCode()">
        ▶ Run Code
    </button>

    <div id="output" class="output-box">
        Your list will appear here...
    </div>

    <div id="feedback" class="feedback"></div>

</div>

<script>
function runCode(){

    const code =
    document.getElementById("editor").value;

    document.getElementById("output").innerHTML = code;

    if(code.includes("<ol>")){
        document.getElementById("feedback").innerHTML =
        "✅ Correct! The missing tag is &lt;ol&gt;.";
    }else{
        document.getElementById("feedback").innerHTML =
        "❌ Incorrect. Maria wants a numbered list.";
    }
}
</script>
