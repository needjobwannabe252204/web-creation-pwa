<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Test 2.8</title>
        <link rel="stylesheet" href="../../css/style.css">
        <link rel="stylesheet" href="../../css/lesson-2.css">      
    </head>

    <body>

        <header class="header">
            <button class="menu-btn" id="menuBtn" aria-controls="sidebar" aria-expanded="false" aria-label="Toggle menu">☰</button>
            <h2 class="title">Web Creation</h2>
            <img src="../../../assets/image/logo/cdm-logo.jpeg" alt="cdm logo" class="logo">
        </header>

        <nav class="sidebar" id="sidebar" aria-hidden="true">
            <button class="close-btn" id="closeBtn">✕</button>
            <a href="/index.html">🏠 Home</a>
            <a href="/src/html/nav-pages/about.html">⁉️ About</a>
            <a href="/src/html/nav-pages/contact.html">☎️ Contact</a>
        </nav>

        <div class="overlay" id="overlay"></div>

        <main class="container">
    
            <article class="card">
                <h2> 📝 Semantic HTML Activity</h2>
                <p><strong>Instructions:</strong></p>
                <p class="description">Create a webpage about yourself using the following semantic tags:</p>
                <div class="requirements">

                    <h3>Requirements:</h3>

                    <div class="requirement-grid">

                        <div class="req-box">
                            ✅ Header
                            <span class="hint">💡
                                <span class="tooltip">&lt;header&gt;</span>
                            </span>
                        </div>

                        <div class="req-box">
                            ✅ Navigation Menu
                            <span class="hint">💡
                                <span class="tooltip">&lt;nav&gt;</span>
                            </span>
                        </div>

                        <div class="req-box">
                            ✅ Main Content
                            <span class="hint">💡
                                <span class="tooltip">&lt;main&gt;</span>
                            </span>
                        </div>

                        <div class="req-box">
                            ✅ Footer
                            <span class="hint">💡
                                <span class="tooltip">&lt;footer&gt;</span>
                            </span>
                        </div>

                    </div>

                </div>

                <br>

                <div class="text-editor">
                    <textarea id="editor" class="code-editor">
<header>
    <h1>Your Name</h1>
</header>

<nav>
    <a href="#">Home</a>
</nav>

<main>
    <p>Write about yourself here.</p>
</main>

<footer>
    <p>Created by Your Name</p>
</footer>
                    </textarea>
                </div>

                <button id="runBtn" class="run-btn">▶ Run Code</button>

                <div id="feedback" class="feedback"></div>

                <iframe id="output" class="output-box" title="Activity Output"></iframe>

            </article>

            <article class="card">
                <button class="btn" data-href="topic-2.8.html"> Done </button>
            </article>


        </main>

        <script src="../../js/test-2.8.js"></script>
        <script src="../../js/script.js"></script>
        
    </body>
</html>
