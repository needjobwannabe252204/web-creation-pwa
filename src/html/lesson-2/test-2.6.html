<h2>📊 HTML Table Row Activity</h2>

<p class="competency">
    Learn how to use the HTML <code>&lt;tr&gt;</code> tag by fixing John's table code.
</p>

<style>
.activity-container{
    margin-top:20px;
}

.activity-header{
    text-align:center;
    margin-bottom:20px;
}

.activity-header h2{
    color:#2563eb;
    margin-bottom:5px;
}

.activity-header p{
    color:#555;
}

.instructions{
    background:#eef4ff;
    border-left:5px solid #2563eb;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    color:black;
}

.example-box{
    background:#f8fafc;
    border:1px solid #cbd5e1;
    border-radius:10px;
    padding:20px;
    margin-bottom:15px;
    color:black;
}

.example-box table{
    border-collapse:collapse;
    width:100%;
    margin-top:10px;
}

.example-box th,
.example-box td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

.code-editor{
    width:100%;
    height:150px;
    padding:12px;
    border:2px solid #d1d5db;
    border-radius:10px;
    background:white;
    color:black;
    font-family:Consolas, monospace;
    font-size:15px;
    box-sizing:border-box;
}

.run-btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

.run-btn:hover{
    background:#1d4ed8;
}

.output-box{
    min-height:150px;
    margin-top:15px;
    border:2px dashed #cbd5e1;
    border-radius:10px;
    padding:15px;
    background:white;
    color:#555555;
}

.feedback{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:black;
}
</style>

<div class="activity-container">


    <div class="instructions">
        <strong>Directions:</strong>
        John wants to create a table row. Replace the blank
        (<strong>____</strong>) with the correct HTML tag.
    </div>

    <div class="example-box">
        <strong>Expected Output:</strong>

        <table>
            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>
            <tr>
                <td>John</td>
                <td>15</td>
            </tr>
        </table>
    </div>

<textarea id="editor" class="code-editor">
<table border="1">
    <____>
        <td>John</td>
        <td>15</td>
    </tr>
</table>
</textarea>

    <button class="run-btn" onclick="runCode()">
        ▶ Run Code
    </button>

    <div id="output" class="output-box">
        Your table will appear here...
    </div>

    <div id="feedback" class="feedback"></div>

</div>

<script>
function runCode(){

    const code =
    document.getElementById("editor").value;

    document.getElementById("output").innerHTML = code;

    if(code.includes("<tr>")){
        document.getElementById("feedback").innerHTML =
        "✅ Correct! The missing tag is &lt;tr&gt;.";
    }
    else{
        document.getElementById("feedback").innerHTML =
        "❌ Incorrect. A table row uses the &lt;tr&gt; tag.";
    }
}
</script>
