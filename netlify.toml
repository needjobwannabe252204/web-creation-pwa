# Netlify configuration for Web Creation PWA

[build]
  publish = "."
  command = ""

# Service worker must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML files should not be cached aggressively
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/src/**/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Manifest should not be cached
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Content-Type = "application/manifest+json"

# CSS and JS can be cached longer (service worker handles updates)
[[headers]]
  for = "/src/**/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "text/css"

[[headers]]
  for = "/src/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Content-Type = "application/javascript"

# Images can be cached long
[[headers]]
  for = "/assets/**/*.{png,jpg,jpeg,gif,svg,webp}"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Videos can be cached long
[[headers]]
  for = "/assets/**/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Accept-Ranges = "bytes"

# Everything else
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
